    }

<body>
  <h1>Neon Survivor</h1>
  <p>ゲームアップデート情報サイト</p>

  <div class="card">

  </div>

  <div class="card">
    <h2>ゲームをプレイ</h2>

    <a href="#">PLAY GAME</a>
  </div>

</html>
